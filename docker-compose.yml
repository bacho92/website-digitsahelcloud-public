services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage/app
      - logs:/var/www/html/storage/logs
      - ./resources:/var/www/html/resources    # ← AJOUTÉ
      - ./public:/var/www/html/public          # ← AJOUTÉ
      - ./docker/nginx.conf:/etc/nginx/nginx.conf    # ← AJOUTER
      - ./docker/ssl:/etc/nginx/ssl                  # ← AJOUTER
      - ./app:/var/www/html/app
    mem_limit: 400m          # ← AJOUTÉ
    memswap_limit: 600m      # ← AJOUTÉ

  db:
    image: mysql:8.0
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=128M
      --innodb-log-file-size=32M
      --max-connections=50
      --tmp-table-size=16M
      --max-heap-table-size=16M
      --performance-schema=OFF
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    mem_limit: 300m
    memswap_limit: 500m

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    mem_limit: 100m          # ← AJOUTÉ
    memswap_limit: 150m      # ← AJOUTÉ

volumes:
  mysql_data:
  storage:
  logs:
